<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag-and-Drop - простая сортировка элементов</title>
    <style>
        * {
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Список для перетаскивания */
        .drag-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        /* Элементы списка */
        .drag-item {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid #dee2e6;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .drag-item:active {
            cursor: grabbing;
        }

        /* Стиль во время перетаскивания */
        .drag-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
            background: #e9ecef;
        }

        /* Стиль при наведении на место вставки */
        .drag-item.drag-over {
            border-top: 3px solid #4CAF50;
            border-bottom: none;
            transform: translateY(3px);
        }

        /* Ручка для перетаскивания */
        .drag-handle {
            cursor: grab;
            font-size: 24px;
            color: #6c757d;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* Номер элемента */
        .drag-number {
            background: #4CAF50;
            color: white;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }

        /* Текст элемента */
        .drag-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button.reset {
            background: #dc3545;
        }

        button.reset:hover {
            background: #c82333;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .drag-item {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Drag-and-Drop Сортировка</h1>
        <p class="subtitle">Перетащите элементы за значок ⋮⋮ для изменения порядка</p>

        <!-- Список элементов -->
        <ul class="drag-list" id="dragList">
            <li class="drag-item" data-id="1">
                <span class="drag-number">1</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент 1</span>
            </li>
            <li class="drag-item" data-id="2">
                <span class="drag-number">2</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент 2</span>
            </li>
            <li class="drag-item" data-id="3">
                <span class="drag-number">3</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент 3</span>
            </li>
            <li class="drag-item" data-id="4">
                <span class="drag-number">4</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент 4</span>
            </li>
            <li class="drag-item" data-id="5">
                <span class="drag-number">5</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент 5</span>
            </li>
        </ul>

        <div class="button-group">
            <button id="getOrderBtn">📋 Получить порядок</button>
            <button id="resetOrderBtn" class="reset">🔄 Сбросить порядок</button>
            <button id="addItemBtn">➕ Добавить элемент</button>
        </div>

        <div class="result" id="result">
            <strong>✨ Текущий порядок:</strong><br>
            1. Элемент 1<br>
            2. Элемент 2<br>
            3. Элемент 3<br>
            4. Элемент 4<br>
            5. Элемент 5
        </div>
    </div>

    <script>
        // Получаем элементы
        const dragList = document.getElementById('dragList');
        const resultDiv = document.getElementById('result');
        let draggedItem = null;
        let originalOrder = [];

        // ============= Функции для работы с Drag-and-Drop =============

        // Функция добавления обработчиков для элемента
        function addDragHandlers(item) {
            // Делаем элемент перетаскиваемым
            item.setAttribute('draggable', 'true');
            
            // dragstart - начало перетаскивания
            item.addEventListener('dragstart', function(e) {
                draggedItem = this;
                // Сохраняем ID элемента
                e.dataTransfer.setData('text/plain', this.dataset.id);
                e.dataTransfer.effectAllowed = 'move';
                
                // Добавляем класс для визуального эффекта
                setTimeout(() => {
                    this.classList.add('dragging');
                }, 0);
            });

            // dragend - окончание перетаскивания
            item.addEventListener('dragend', function(e) {
                this.classList.remove('dragging');
                
                // Убираем подсветку со всех элементов
                document.querySelectorAll('.drag-item').forEach(i => {
                    i.classList.remove('drag-over');
                });
                
                draggedItem = null;
            });

            // dragover - разрешаем сброс
            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });

            // dragenter - вход в элемент
            item.addEventListener('dragenter', function(e) {
                e.preventDefault();
                if (this !== draggedItem) {
                    this.classList.add('drag-over');
                }
            });

            // dragleave - выход из элемента
            item.addEventListener('dragleave', function(e) {
                this.classList.remove('drag-over');
            });

            // drop - сброс элемента
            item.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                
                if (!draggedItem || draggedItem === this) return;
                
                // Перемещаем элемент
                const parent = this.parentNode;
                const draggedIndex = Array.from(parent.children).indexOf(draggedItem);
                const targetIndex = Array.from(parent.children).indexOf(this);
                
                if (draggedIndex < targetIndex) {
                    // Перемещаем вниз
                    parent.insertBefore(draggedItem, this.nextSibling);
                } else {
                    // Перемещаем вверх
                    parent.insertBefore(draggedItem, this);
                }
                
                // Обновляем нумерацию
                updateNumbers();
                
                // Обновляем отображение порядка
                updateOrderDisplay();
            });
        }

        // Обновление номеров элементов
        function updateNumbers() {
            const items = document.querySelectorAll('.drag-item');
            items.forEach((item, index) => {
                const numberSpan = item.querySelector('.drag-number');
                if (numberSpan) {
                    numberSpan.textContent = index + 1;
                }
                // Обновляем data-id для соответствия новому порядку
                item.setAttribute('data-id', index + 1);
            });
        }

        // Получение текущего порядка
        function getCurrentOrder() {
            const items = document.querySelectorAll('.drag-item');
            const order = [];
            items.forEach(item => {
                const text = item.querySelector('.drag-text').textContent;
                order.push(text);
            });
            return order;
        }

        // Обновление отображения порядка
        function updateOrderDisplay() {
            const order = getCurrentOrder();
            let resultHtml = '<strong>✨ Текущий порядок:</strong><br>';
            order.forEach((text, index) => {
                resultHtml += `${index + 1}. ${text}<br>`;
            });
            resultDiv.innerHTML = resultHtml;
            
            // Анимация обновления
            resultDiv.style.transform = 'scale(1.02)';
            setTimeout(() => {
                resultDiv.style.transform = 'scale(1)';
            }, 200);
        }

        // Сброс порядка
        function resetOrder() {
            if (originalOrder.length === 0) return;
            
            const items = Array.from(document.querySelectorAll('.drag-item'));
            const sortedItems = originalOrder.map(text => {
                return items.find(item => 
                    item.querySelector('.drag-text').textContent === text
                );
            }).filter(item => item);
            
            sortedItems.forEach(item => {
                dragList.appendChild(item);
            });
            
            updateNumbers();
            updateOrderDisplay();
            
            // Анимация сброса
            resultDiv.style.background = '#d4edda';
            setTimeout(() => {
                resultDiv.style.background = '#f8f9fa';
            }, 500);
        }

        // Добавление нового элемента
        function addNewItem() {
            const newNumber = document.querySelectorAll('.drag-item').length + 1;
            const newItem = document.createElement('li');
            newItem.className = 'drag-item';
            newItem.setAttribute('data-id', newNumber);
            newItem.innerHTML = `
                <span class="drag-number">${newNumber}</span>
                <span class="drag-handle">⋮⋮</span>
                <span class="drag-text">Элемент ${newNumber}</span>
            `;
            
            dragList.appendChild(newItem);
            addDragHandlers(newItem);
            updateNumbers();
            updateOrderDisplay();
            
            // Обновляем исходный порядок
            saveOriginalOrder();
        }

        // Сохранение исходного порядка
        function saveOriginalOrder() {
            originalOrder = getCurrentOrder();
        }

        // Показать порядок в alert
        function showOrder() {
            const order = getCurrentOrder();
            let message = 'Текущий порядок элементов:\n\n';
            order.forEach((text, index) => {
                message += `${index + 1}. ${text}\n`;
            });
            alert(message);
        }

        // ============= Инициализация =============
        
        function init() {
            // Добавляем обработчики для всех существующих элементов
            const items = document.querySelectorAll('.drag-item');
            items.forEach(item => addDragHandlers(item));
            
            // Сохраняем исходный порядок
            saveOriginalOrder();
            
            // Обновляем отображение порядка
            updateOrderDisplay();
            
            // Навешиваем обработчики на кнопки
            document.getElementById('getOrderBtn').addEventListener('click', showOrder);
            document.getElementById('resetOrderBtn').addEventListener('click', resetOrder);
            document.getElementById('addItemBtn').addEventListener('click', addNewItem);
            
            // Предотвращаем стандартное поведение браузера для всего списка
            dragList.addEventListener('dragover', function(e) {
                e.preventDefault();
            });
        }

        // Запускаем
        init();
    </script>
</body>
</html>
